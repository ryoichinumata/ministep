<div class="page">
<header class="brand-header">

<div class="brand-text-center-absolute">
<div class="brand-name">MiniStep</div>
<div class="brand-subtitle" data-i18n="subtitle_brand">小さな挑戦ガチャ</div>
</div>
</header>
<main class="app">
<header class="today-info">
<div>
<div class="streak-label" data-i18n="today_challenge">今日のチャレンジ</div>
<div class="streak-value">
<span id="today-date">1月1日（月）</span>
</div>
</div>
<!-- 引き直し回数 -->
<div class="reroll-info">
<span data-i18n="reroll_limit" data-i18n-arg='{"count":0}' id="reroll-label">
                        本日の引き直し: 0 / 3
                    </span>
<span class="reroll-pill" id="reroll-pill">□□□ 0/3</span>
<span class="sr-only" id="reroll-pill-sr">残り引き直し: 3</span>
</div>
</header>
<!-- チャレンジ結果カード -->
<article aria-live="polite" class="challenge-card visible" id="challenge-card">
<div class="challenge-label">
<span data-i18n="badge_today_only">本日限り</span>
</div>
<p class="challenge-text challenge-text--result" id="challenge-text">
                    チャレンジがここに表示されます。
                </p>
<div class="challenge-meta">
<span class="pill pill-outside" id="challenge-category">カテゴリ</span>
<span class="difficulty" id="challenge-difficulty">難易度</span>
</div>
<p class="micro-coach" data-i18n="back_hint">
                    このチャレンジは今日のホームカードに表示されます。完了したらそこで達成をタップ。
                </p>
</article>

</svg>
</div>
<div class="mascot-comment-bubble">
<p class="mascot-comment-label">ステッピーよりひとこと</p>
<p class="mascot-comment-text" id="mascot-comment-text">
                                「この一歩を踏み出せたなら、今日は勝ちです。」
                            </p>
</div>
</div>
</section>
<!-- クイックアクション -->
<section aria-label="チャレンジサポート" class="quick-actions">
<button class="btn-outline" data-i18n="qa_timer" id="qa-timer">⏱ 3分タイマー</button>
<button class="btn-outline" data-i18n="qa_memo" id="qa-memo">📝 メモを開く</button>
<button class="btn-outline" data-i18n="qa_map" id="qa-map">🧭 近くを散歩</button>
</section>
<section aria-label="シェア" class="share-section">
<button class="btn-outline" data-i18n="share_x" id="share-x-btn">
                        𝕏でシェア
                    </button>
</section>
<!-- 引き直し / ホームへ戻る -->
